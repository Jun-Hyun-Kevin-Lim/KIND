name: KIND Pipeline - RAW + Parse

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 22,23 * * 0-4"
    - cron: "*/5 0-12 * * 1-5"

concurrency:
  group: kind-pipeline
  cancel-in-progress: false

jobs:
  run-kind-parse:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: Asia/Seoul
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      HEADLESS: "true"
      LIMIT: "30"
      DUMP_SHEET_NAME: "RAW_dump"
      SEEN_SHEET_NAME: "seen"
      RIGHTS_SHEET_NAME: "K_유상증자"
      BOND_SHEET_NAME: "K_주식연계채권"
      PARSE_LOG_SHEET_NAME: "parse_log"
      REVIEW_SHEET_NAME: "review_queue"
      REVIEW_LOOKBACK_MINUTES: "20"
      KEYWORDS: "유상증자결정,전환사채권발행결정,교환사채권발행결정,신주인수권부사채권발행결정"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run RAW scraper
        run: python main_raw.py

      - name: Run parser
        run: python main_parse.py
