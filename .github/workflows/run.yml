#action
name: KIND Pipeline -> Google Sheets

on:
  workflow_dispatch:
  schedule:
  - cron: "*/10 0-13,22-23 * * *"

jobs:
  run-kind-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: Asia/Seoul
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      HEADLESS: "true"
      LIMIT: "30"
      DUMP_SHEET_NAME: "RAW_dump"
      SEEN_SHEET_NAME: "seen"
      RIGHTS_SHEET_NAME: "유상증자"
      BOND_SHEET_NAME: "주식연계채권"
      PARSE_LOG_SHEET_NAME: "parse_log"
      KEYWORDS: "유상증자결정,전환사채권발행결정,교환사채권발행결정,신주인수권부사채권발행결정"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check env exists
        run: |
          echo "GOOGLE_SHEET_ID length: ${#GOOGLE_SHEET_ID}"
          echo "GOOGLE_CREDENTIALS_JSON length: ${#GOOGLE_CREDENTIALS_JSON}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run RAW scraper
        run: |
          python main_raw.py

      - name: Run parser
        run: |
          python main_parse.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kind-debug-files
          path: out/debug/
          if-no-files-found: ignore
